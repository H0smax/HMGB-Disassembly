name: Build and verify

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install RGBDS v1.0.1
        run: |
          wget -q https://github.com/gbdev/rgbds/releases/download/v1.0.1/rgbds-linux-x86_64.tar.xz
          tar -xf rgbds-linux-x86_64.tar.xz
          sudo mv rgbasm rgblink rgbfix rgbgfx /usr/local/bin/
          rgbasm --version

      - name: Build and verify
        run: make